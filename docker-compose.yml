services:
  # ============================================
  # Uncomment blok di bawah untuk menjalankan
  # app via Docker (mode production build).
  # Pastikan DB_HOST=postgres dan REDIS_HOST=redis
  # di .env jika menggunakan mode ini.
  # ============================================
  api:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: bukitcendana-be
    ports:
      - "8082:8080"
    env_file:
      - be/.env
        #    depends_on:
        #postgres:
        #condition: service_healthy
        #redis:
        #condition: service_healthy
    restart: unless-stopped
    networks:
      - bukitcendana-network

  app:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://bukitcendana.my.id/api/v1
    container_name: bukitcendana-fe
    ports:
      - "3006:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

